name: AI Digest

on:
  schedule:
    - cron: '10 2 * * *'  # Runs daily at 02:10 UTC / 10:10 Asia/Shanghai
  workflow_dispatch:

jobs:
  ai-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Configure AI digest only
        run: |
          tmp_config="$(mktemp)"
          jq \
            '.digests.finance.enabled = false
             | .digests.ai.enabled = true
             | .webhook.url_env = "HORIZON_AI_DIGEST_WEBHOOK_URL"' \
            data/config.json > "$tmp_config"
          mv "$tmp_config" data/config.json

      - name: Run Horizon AI digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          HORIZON_AI_DIGEST_WEBHOOK_URL: ${{ secrets.HORIZON_AI_DIGEST_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRODUCT_HUNT_TOKEN: ${{ secrets.PRODUCT_HUNT_TOKEN }}
        run: uv run horizon --digests

      - name: Set current date as environment variable
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true
          commit_message: "AI Digest: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true
